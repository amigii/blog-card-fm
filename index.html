<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | Blog preview card</title>

  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
    <div class="container">
        <article class="card">
            <div class="card-img">
                <img src="./assets/images/illustration-article.svg" alt="abstract card image">
            </div>
            <div class="card-cont">
                <div class="card-cont-info">
                    <h2>Learning</h2>
                    <p>Published 21 Dec 2023</p>
                </div>
                <div class="card-cont-text">
                    <h1>HTML & CSS foundations</h1>
                    <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
                </div>
                <div class="card-end">
                    <img src="./assets/images/image-avatar.webp">
                    <p>Greg Hooper</p>
                </div>
            </div>
        </article>
    </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Amanda González Imás</a>.
  </footer>
</body>
</html>
